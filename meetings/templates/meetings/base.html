<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Meeting Transcribe{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --panel: #ffffff;
            --text: #172033;
            --muted: #667085;
            --line: #d9e0ec;
            --accent: #2357d8;
            --accent-dark: #183fa4;
            --danger: #a33a35;
            --ok: #256e4a;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.45;
        }
        a { color: var(--accent); }
        .page {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 56px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        h1 {
            margin: 0;
            font-size: 30px;
            letter-spacing: 0;
        }
        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
        }
        .logout-form { margin: 0; }
        .button,
        button {
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #ffffff;
            border-radius: 7px;
            padding: 10px 14px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        .button.secondary,
        button.secondary {
            background: #ffffff;
            color: var(--accent);
        }
        button:hover { background: var(--accent-dark); }
        button.secondary:hover {
            background: #eef3ff;
            color: var(--accent-dark);
        }
        .messages {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }
        .message {
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 12px 14px;
            background: #ffffff;
        }
        .message.success {
            border-color: #b6dec9;
            color: var(--ok);
            background: #effaf4;
        }
        .message.error {
            border-color: #e8b8b4;
            color: var(--danger);
            background: #fff1f0;
        }
        .meeting-list {
            display: grid;
            gap: 18px;
        }
        .meeting {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
        }
        .meeting-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 14px;
        }
        .meeting-title {
            margin: 0 0 6px;
            font-size: 20px;
        }
        .meta {
            color: var(--muted);
            font-size: 14px;
        }
        .status {
            white-space: nowrap;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 4px 10px;
            color: var(--muted);
            background: #fafcff;
            font-size: 13px;
            font-weight: 700;
        }
        .minutes-form {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 12px;
            margin: 14px 0;
        }
        .import-panel {
            margin-bottom: 22px;
        }
        .import-form {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) minmax(240px, 1.4fr) auto;
            gap: 12px;
            align-items: end;
            margin: 14px 0 8px;
        }
        .import-progress {
            min-height: 20px;
            margin: 6px 0;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin: 14px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }
        select,
        input {
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 8px 10px;
            background: #ffffff;
            color: var(--text);
            font: inherit;
        }
        .minutes {
            margin-top: 16px;
            border-top: 1px solid var(--line);
            padding-top: 16px;
        }
        .minutes h3 {
            margin: 0 0 8px;
            font-size: 17px;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #f8fafd;
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 14px;
            font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
            font-size: 14px;
        }
        .message-detail {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
        }
        .message-detail + .message-detail {
            margin-top: 16px;
        }
        .message-heading {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .message-heading h3 {
            margin: 0;
            font-size: 18px;
        }
        .audio-list {
            display: grid;
            gap: 10px;
            margin: 12px 0 16px;
        }
        .audio-item {
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 10px;
            background: #f8fafd;
        }
        audio {
            display: block;
            width: 100%;
            margin-top: 8px;
        }
        .section-title {
            margin: 18px 0 10px;
            font-size: 22px;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 12px;
        }
        .summary-box {
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 12px;
            background: #fbfcff;
        }
        .summary-box h4 {
            margin: 0 0 8px;
            font-size: 14px;
            color: var(--muted);
        }
        .summary-box p {
            margin: 0;
        }
        .clipboard-source {
            position: fixed;
            left: -9999px;
            top: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
        }
        .empty {
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 24px;
            color: var(--muted);
        }
        .login-panel {
            width: min(420px, 100%);
            margin: 80px auto;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 24px;
        }
        .login-panel h1 { font-size: 26px; }
        .login-panel form {
            display: grid;
            gap: 14px;
            margin-top: 18px;
        }
        .login-panel input {
            width: 100%;
        }
        .form-error {
            color: var(--danger);
            font-size: 14px;
        }
        @media (max-width: 720px) {
            .topbar,
            .meeting-header {
                display: block;
            }
            .logout-form {
                margin-top: 14px;
            }
            .status {
                display: inline-block;
                margin-top: 10px;
            }
            .minutes-form {
                display: grid;
            }
            .import-form {
                grid-template-columns: 1fr;
            }
            .actions {
                display: grid;
            }
            .message-heading {
                display: block;
            }
            button,
            select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
